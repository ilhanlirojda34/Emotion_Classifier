<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#050810"/>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00B4FF" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Core sphere -->
  <radialGradient id="g" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#00B4FF" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#050810" stop-opacity="0.9"/>
  </radialGradient>
  <circle cx="16" cy="16" r="10" fill="url(#g)"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#00B4FF" stroke-width="1" opacity="0.8"/>
  
  <!-- Waveform -->
